<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demons SMP - Tuff Client Beta 1.12.2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loader {
            border: 4px solid #333;
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 101;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #fff;
            color: #fff;
            padding: 5px 10px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p>Launching Tuff Client Beta 1.12.2...</p>
    </div>

    <a href="../index.html" class="back-btn">BACK TO LAUNCHER</a>

    <iframe id="game-frame" src="https://eaglercraft.com/mc/1.12.2" allowfullscreen></iframe>

    <script>
        const frame = document.getElementById('game-frame');
        const loader = document.getElementById('loading-screen');

        frame.onload = () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 1000);
            }, 1500); // Simulated loading time
        };

        // Handle full screen
        function requestFullScreen() {
            const element = document.documentElement;
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            } else if (element.msRequestFullscreen) {
                element.msRequestFullscreen();
            }
        }

        window.addEventListener('click', () => {
            // Uncomment to force fullscreen on click
            // requestFullScreen();
        }, { once: true });
    </script>
</body>
</html>
